<!DOCTYPE html>
<html lang="id">
<head>

<title>Pembayaran</title>

<style>
  <script>

function bayar(){

</button>

<script>

const params = new URLSearchParams(window.location.search);

document.getElementById("bulan").innerText = bulan;

}
