<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIPS Modern</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="sidebar">

<h2>SIPS</h2>

<a href="#">🏠 Dashboard</a>
<a href="#">👤 Profil</a>
<a href="#">💰 Pembayaran</a>
<a href="#">📢 Pengaduan</a>
<a href="#">🚪 Logout</a>

</div>

<div class="main">

<div class="card-box profile-card">

<div class="profile">

<img class="foto" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

<div class="text-profile">
<h2>MELDRA</h2>
<p>Warga Aktif</p>
</div>

</div>

</div>

<div class="card-box">

<h2>Progress Pembayaran</h2>

<div class="progress">
<div class="progress-bar">50%</div>
</div>

<div class="status-container">

<div class="status-box bayar">
<h1>Rp 150.000</h1>
<p>Total Bayar</p>
</div>

<div class="status-box belum">
<h1>Belum Lunas</h1>
<p>Status</p>
</div>

</div>

</div>

<div class="card-box">

<h2>Riwayat Pembayaran</h2>

<table>

<tr>
<th>Bulan</th>
<th>Status</th>
</tr>

<tr>
<td>Januari</td>
<td><span class="badge lunas">Lunas</span></td>
</tr>

<tr>
<td>Februari</td>
<td><span class="badge belum-badge">Belum</span></td>
</tr>

<tr>
<td>Maret</td>
<td><span class="badge lunas">Lunas</span></td>
</tr>

</table>

</div>

</div>

</body>
</html>
