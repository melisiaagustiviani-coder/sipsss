<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIPS Modern</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container login-page" id="loginPage">

  <div class="card login-card shadow">

    <h2 class="text-center mb-4">SIPS LOGIN</h2>

    <input type="text" id="username" class="form-control mb-3" placeholder="Username">

    <input type="password" id="password" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-primary w-100" onclick="login()">
      Login
    </button>

  </div>

</div>

<div id="dashboardPage" style="display:none;">

<nav class="navbar navbar-dark bg-primary">

<div class="container-fluid">

<span class="navbar-brand">
SIPS Dashboard
</span>

<button class="btn btn-light" onclick="logout()">
Logout
</button>

</div>

</nav>

<div class="container mt-4">

<div class="row g-3">

<div class="col-6 col-md-3">

<div class="card dashboard-card shadow">

<h5>👥 Warga</h5>

<p id="jumlahWarga">0</p>

</div>

</div>

<div class="col-6 col-md-3">

<div class="card dashboard-card shadow">

<h5>💰 Pembayaran</h5>

<p id="jumlahBayar">0</p>

</div>

</div>

<div class="col-6 col-md-3">

<div class="card dashboard-card shadow">

<h5>📢 Pengaduan</h5>

<p>3</p>

</div>

</div>

<div class="col-6 col-md-3">

<div class="card dashboard-card shadow">

<h5>🗑 Jadwal</h5>

<p>Aktif</p>

</div>

</div>

</div>

<div class="card shadow p-4 mt-4">

<h4>Tambah Warga</h4>

<input type="text" id="namaWarga"
class="form-control mb-3"
placeholder="Nama Warga">

<button class="btn btn-primary"
onclick="tambahWarga()">

Tambah

</button>

</div>

<div class="card shadow p-4 mt-4">

<h4>Data Warga</h4>

<table class="table">

<thead>

<tr>

<th>No</th>
<th>Nama</th>
<th>Aksi</th>

</tr>

</thead>

<tbody id="tableWarga">

</tbody>

</table>

</div>

<div class="card shadow p-4 mt-4">

<h4>Upload Bukti Pembayaran</h4>

<input type="file"
id="buktiBayar"
class="form-control mb-3">

<button class="btn btn-success"
onclick="uploadBukti()">

Upload

</button>

<div id="preview" class="mt-3"></div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
